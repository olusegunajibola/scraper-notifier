name: MIM ATA Bot 8x Daily

on: 
  schedule:
    # Runs at 00:07, 03:07, 06:07, 09:07, 12:07, 15:07, 18:07, 21:07 UTC
    - cron: '7 */3 * * *'       
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    # Added a "permissions" block to allow the bot to write history back to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        #   pip install requests beautifulsoup4 google-genai python-dotenv

      - name: Run the bot
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scraperv2_it.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          
          # This ensures the command doesn't crash if the files don't exist yet
          touch sent_notifications.txt run_log.txt
          
          git add sent_notifications.txt run_log.txt
          
          # This only commits if there are actual changes, preventing "nothing to commit" errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update logs and history [skip ci]" && git push)